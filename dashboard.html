<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.5.0/dist/chart.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/menubar.css">
  <link rel="stylesheet" href="css/pricing.css">
  <link rel="stylesheet" href="css/nidaan.css">
  <style>
    .card { border-radius: 10px; }
    .card-header { background-color: black; border-bottom: none; }
    .card-body { padding: 20px; text-align: center; color: ivory; animation: fadeInUp 0.4s ease both; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .chart-container { height: 400px; display: flex; justify-content: center; align-items: center; }
    .prospects       { background: linear-gradient(135deg, #3730a3, #5b52e8); color: #fff; }
    .pendingauth     { background: linear-gradient(135deg, #c2410c, #fb923c); color: #fff; }
    .active-cases    { background: linear-gradient(135deg, #0369a1, #38bdf8); color: #fff; }
    .completed-cases { background: linear-gradient(135deg, #065f46, #34d399); color: #fff; }
    .approved-cases  { background: linear-gradient(135deg, #6d28d9, #c084fc); color: #fff; }
    .rejected-cases  { background: linear-gradient(135deg, #9f1239, #fb7185); color: #fff; }
    .manager-chart   { color: #fff; }
    body { background-color: #343a40; color: #fff; }
    .form-control { background-color: #495057; color: #fff; }
    .form-control:focus { background-color: #343a40; color: #fff; }
    .btn-primary { background-color: #007bff; border-color: #007bff; }
    .btn-primary:hover, .btn-primary:focus { background-color: #0062cc; border-color: #005cbf; }
    .chart-panel { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; margin: 10px; }
    .chart-panel h6 { color: #adb5bd; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  </style>
  <title>Dashboard</title>
</head>
<body>
  <div class='dashboard'>
    <div id="navbar-placeholder"></div>
    <div class='dashboard-app'>
      <header class='dashboard-toolbar'><a href="#!" class="menu-toggle"><i class="fas fa-bars"></i></a></header>
      <div class='dashboard-content' style="background-image: url('/images/background20.jpg'); background-repeat: repeat; background-size: cover;">
        <div style="font-size: 20px; padding-top: 50px; padding-right: 20px; padding-left: 20px;">

          <!-- CASE DATA CARDS -->
          <div style="border: 2px solid #007bff; border-radius: 10px; padding: 20px; margin: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
            <h2 class="text-center mb-4">Case Data</h2>
            <div class="row g-3">
              <div class="col-lg-2 col-md-4 col-6"><a href="/viewprospectcases.html" style="text-decoration:none;"><div class="card prospects"><div class="card-header"><h5 class="card-title">New</h5></div><div class="card-body"><h3 id="newcasecount" class="card-text">Ś</h3></div></div></a></div>
              <div class="col-lg-2 col-md-4 col-6"><a href="/viewmedicalopinioncases.html" style="text-decoration:none;"><div class="card prospects"><div class="card-header"><h5 class="card-title">Medical</h5></div><div class="card-body"><h3 id="inmedicalcount" class="card-text">Ś</h3></div></div></a></div>
              <div class="col-lg-2 col-md-4 col-6"><a href="/viewmedicalopinioncases.html" style="text-decoration:none;"><div class="card prospects"><div class="card-header"><h5 class="card-title">Query</h5></div><div class="card-body"><h3 id="inmedicalquerycount" class="card-text">Ś</h3></div></div></a></div>
              <div class="col-lg-2 col-md-4 col-6"><a href="/viewapprovedcases.html" style="text-decoration:none;"><div class="card approved-cases"><div class="card-header"><h5 class="card-title">Approved</h5></div><div class="card-body"><h3 id="approvedcount" class="card-text">Ś</h3></div></div></a></div>
              <div class="col-lg-2 col-md-4 col-6"><a href="/viewrejectedcases.html" style="text-decoration:none;"><div class="card rejected-cases"><div class="card-header"><h5 class="card-title">Rejected</h5></div><div class="card-body"><h3 id="rejectedcount" class="card-text">Ś</h3></div></div></a></div>
              <div class="col-lg-2 col-md-4 col-6"><a href="/viewlivecases.html" style="text-decoration:none;"><div class="card active-cases"><div class="card-header"><h5 class="card-title">Live</h5></div><div class="card-body"><h3 id="livecasecount" class="card-text">Ś</h3></div></div></a></div>
              <div class="col-lg-2 col-md-4 col-6"><a href="/viewescalationcases.html" style="text-decoration:none;"><div class="card pendingauth"><div class="card-header"><h5 class="card-title">Escalation</h5></div><div class="card-body"><h3 id="pendingauthcountcount" class="card-text">Ś</h3></div></div></a></div>
              <div class="col-lg-2 col-md-4 col-6"><a href="/viewcompletedcases.html" style="text-decoration:none;"><div class="card completed-cases"><div class="card-header"><h5 class="card-title">Completed</h5></div><div class="card-body"><h3 id="completedcasecount" class="card-text">Ś</h3></div></div></a></div>
            </div>
          </div>

          <!-- ANALYTICS CHARTS -->
          <div style="border: 2px solid #007bff; border-radius: 10px; padding: 20px; margin: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
            <h2 class="text-center mb-4">Analytics</h2>
            <div class="row">
              <div class="col-md-8"><div class="chart-panel"><h6>Case Pipeline</h6><canvas id="barChart" height="120"></canvas></div></div>
              <div class="col-md-4"><div class="chart-panel"><h6>Outcome Breakdown</h6><canvas id="donutChart" height="200"></canvas></div></div>
              <div class="col-md-6"><div class="chart-panel"><h6>Stage Funnel</h6><canvas id="funnelChart" height="160"></canvas></div></div>
              <div class="col-md-6"><div class="chart-panel"><h6>Active vs Resolved</h6><canvas id="polarChart" height="160"></canvas></div></div>
            </div>
          </div>

          <!-- EXCEL DOWNLOAD -->
          <div style="border: 2px solid #007bff; border-radius: 10px; padding: 20px; margin: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
            <div style="display: flex; flex-wrap: wrap;">
              <div style="margin-top: 10px;">
                <label>Select Case Status:</label>
                <select class="form-control" id="casefinalstatus" style="height: 50px; width: 200px;">
                  <option value="" disabled selected>Select status</option>
                  <option>New Case</option><option>In Medical</option><option>Medical Query</option>
                  <option>Approved</option><option>Rejected</option><option>Live</option>
                  <option>Draft Query</option><option>Gist Generated</option><option>Pending Draft</option>
                  <option>Reimbursement</option><option>Pending Doc</option>
                  <option>Escalation Pending</option><option>Escalation Query</option><option>Escalated</option>
                  <option>Lokpal Pending</option><option>Lokpal Registered</option>
                  <option>Annexure5 Pending</option><option>Annexure5 Replied</option>
                  <option>Annexure 6 Pending</option><option>Annexure 6 Replied</option>
                  <option>Completed</option><option>Hearing</option>
                  <option>Escalation Settlement</option><option>Consent</option>
                  <option>Pending Payment</option><option>CP Payment Pending</option><option>Case Closed</option>
                </select>
              </div>
              <div style="margin-top: 10px; margin-left:15px;"><label>Live Start Date:</label><input type="date" id="livestartDate" class="form-control" style="height: 50px; width: 200px;"/></div>
              <div style="margin-top: 10px; margin-left:15px;"><label>Live End Date:</label><input type="date" id="liveendDate" class="form-control" style="height: 50px; width: 200px;"/></div>
              <div style="margin-top: 10px; margin-left:15px;"><label>Nidaan Payment Start Date:</label><input type="date" id="nidaanstartDate" class="form-control" style="height: 50px; width: 200px;"/></div>
              <div style="margin-top: 10px; margin-left:15px;"><label>Nidaan Payment End Date:</label><input type="date" id="nidaanendDate" class="form-control" style="height: 50px; width: 200px;"/></div>
            </div>
            <div style="margin-top: 20px; display: flex; flex-wrap: wrap; gap: 15px;">
              <button class="btn btn-primary btn-sm" style="height: 50px; width: 200px;" onclick="downloadexcelfilebystatus()">Download Excel by Status</button>
              <button class="btn btn-primary btn-sm" style="height: 50px; width: 200px;" onclick="downloadexcelfilebylivedate()">Download Excel by Live Date</button>
              <button class="btn btn-primary btn-sm" style="height: 50px; width: 200px;" onclick="downloadexcelfilebynidaandate()">Download Excel by Nidaan Date</button>
              <button class="btn btn-primary btn-sm" style="height: 50px; width: 200px;" onclick="downloadexcelfile()">Download Excel</button>
            </div>
          </div>

          <!-- MEDICAL OFFICER + SECURITY -->
          <div style="border: 2px solid #007bff; border-radius: 10px; padding: 20px; margin: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
            <div style="display: flex; flex-wrap: wrap; gap: 15px;">
              <div style="margin-top: 10px;"><label>Select Medical Officer:</label><select class="form-control" id="medicalofficerdropdown" style="height: 50px; width: 200px;"><option value="" disabled selected>Select officer</option></select></div>
              <div style="margin-top: 10px;"><label>Set Security Code:</label><input type="text" class="form-control" id="securitycode" style="height: 50px; width: 200px;" placeholder="Enter security code"></div>
            </div>
            <div style="margin-top: 20px; display: flex; flex-wrap: wrap; gap: 15px;">
              <button class="btn btn-primary btn-sm" style="height: 50px; width: 200px;" onclick="downloadexcelmedicalofficer()">Download Excel by Medical Officer</button>
              <button class="btn btn-primary btn-sm" style="height: 50px; width: 200px;" onclick="saveSecurityCode()">Save Security Code</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/nidaan-table.js"></script>
  <script>
    const mobileScreen = window.matchMedia("(max-width: 990px)");
    const _cd = {};

    $(document).ready(function () {
      fetch('navbar.html').then(r => r.text()).then(data => {
        document.getElementById('navbar-placeholder').innerHTML = data;
        const roleMap = { admin:'#showonlogin', operation:'#showtooperation', manager:'#showtomanager', cp:'#showtocp', medicalofficer:'#showtomedicalofficer', advocate:'#showtoadvocate', marketing:'#showtomarketing', marketingmanager:'#showtomarketingmanager', coordinator:'#showtocoordinator' };
        $.ajax({ url: '/api/whoami', type: 'POST',
          success: function(r) {
            const sel = roleMap[r.message];
            if (sel) { $('#login-menu').html('<i class="fas fa-sign-out"></i> Logout'); document.getElementById('login-menu').href='/logout.html'; $(sel).show(); $('#hideonlogin').hide(); localStorage['userName']=r.username; localStorage['userType']=r.message; }
            else { window.location.href='/login.html'; }
          },
          error: function() { window.location.href='/login.html'; }
        });
        $(".dashboard-nav-dropdown-toggle").click(function() { $(this).closest(".dashboard-nav-dropdown").toggleClass("show").find(".dashboard-nav-dropdown").removeClass("show"); $(this).parent().siblings().removeClass("show"); });
        $(".menu-toggle").click(function() { if(mobileScreen.matches) $(".dashboard-nav").toggleClass("mobile-show"); else $(".dashboard").toggleClass("dashboard-compact"); });
      });

      $.ajax({ url:'/api/getmedicalteamlist', type:'GET', success: function(r) { var s=$('#medicalofficerdropdown'); r.forEach(function(o){ s.append($('<option>',{value:o.userID,text:o.userName})); }); } });

      const kpis = [
        {id:'newcasecount',url:'/api/getnewcaseCount',k:'new'},
        {id:'inmedicalcount',url:'/api/getmedicalCount',k:'medical'},
        {id:'inmedicalquerycount',url:'/api/getmedicalqueryCount',k:'query'},
        {id:'approvedcount',url:'/api/getapprovedcaseCount',k:'approved'},
        {id:'rejectedcount',url:'/api/getrejectedcaseCount',k:'rejected'},
        {id:'livecasecount',url:'/api/getlivecaseCount',k:'live'},
        {id:'pendingauthcountcount',url:'/api/getpendingauthcaseCount',k:'esc'},
        {id:'completedcasecount',url:'/api/getcompletedcaseCount',k:'done'},
      ];
      var done=0;
      kpis.forEach(function(k) {
        $.ajax({ url:k.url, type:'GET',
          success:function(r){ var n=parseInt(r)||0; _cd[k.k]=n; animNum(k.id,n); if(++done===kpis.length) renderCharts(); },
          error:function(){ _cd[k.k]=0; document.getElementById(k.id).textContent='0'; if(++done===kpis.length) renderCharts(); }
        });
      });
    });

    function animNum(id,t) { var el=document.getElementById(id); if(!el)return; var v=0,s=Math.ceil(t/40)||1; var i=setInterval(function(){ v=Math.min(v+s,t); el.textContent=v; if(v>=t)clearInterval(i); },25); }

    function renderCharts() {
      Chart.defaults.color='#adb5bd'; Chart.defaults.font.family='Inter,sans-serif';
      var g='rgba(255,255,255,0.06)';
      var c=_cd;
      new Chart(document.getElementById('barChart'),{type:'bar',data:{labels:['New','Medical','Query','Approved','Rejected','Live','Escalation','Completed'],datasets:[{label:'Cases',data:[c.new,c.medical,c.query,c.approved,c.rejected,c.live,c.esc,c.done],backgroundColor:['#6366f1','#0ea5e9','#f59e0b','#a78bfa','#ef4444','#10b981','#fb923c','#14b8a6'],borderRadius:8,borderSkipped:false}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:g}},y:{grid:{color:g},beginAtZero:true,ticks:{precision:0}}}}});
      new Chart(document.getElementById('donutChart'),{type:'doughnut',data:{labels:['Approved','Rejected','Live','Completed'],datasets:[{data:[c.approved,c.rejected,c.live,c.done],backgroundColor:['#a78bfa','#ef4444','#10b981','#14b8a6'],borderColor:'#343a40',borderWidth:3}]},options:{responsive:true,cutout:'62%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:12}}}}});
      new Chart(document.getElementById('funnelChart'),{type:'bar',data:{labels:['New','Medical','Approved','Live','Esc','Completed'],datasets:[{label:'Cases',data:[c.new,c.medical,c.approved,c.live,c.esc,c.done],backgroundColor:'rgba(99,102,241,0.75)',borderRadius:6,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:g},beginAtZero:true,ticks:{precision:0}},y:{grid:{color:'transparent'}}}}});
      new Chart(document.getElementById('polarChart'),{type:'polarArea',data:{labels:['New','Medical','Live','Escalation'],datasets:[{data:[c.new,c.medical,c.live,c.esc],backgroundColor:['rgba(99,102,241,0.7)','rgba(14,165,233,0.7)','rgba(16,185,129,0.7)','rgba(251,146,60,0.7)']}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10}}},scales:{r:{grid:{color:g},ticks:{display:false}}}}});
    }

    function downloadexcelfilebynidaandate(){ fetch('/api/downloadExcelbynidaandate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nidaanstartdate:$('#nidaanstartDate').val(),nidaanenddate:$('#nidaanendDate').val()})}).then(r=>r.blob()).then(b=>{var a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(b),download:'Case_Data.xlsx'});document.body.appendChild(a);a.click();a.remove();}).catch(console.error); }
    function downloadexcelfilebylivedate(){ fetch('/api/downloadExcelbylivedate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({livestartdate:$('#livestartDate').val(),liveenddate:$('#liveendDate').val()})}).then(r=>r.blob()).then(b=>{var a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(b),download:'Case_Data.xlsx'});document.body.appendChild(a);a.click();a.remove();}).catch(console.error); }
    function saveSecurityCode(){ $.ajax({url:'/api/setsecuritycode',type:'POST',contentType:'application/x-www-form-urlencoded',data:{securityCode:$('#securitycode').val()},success:function(r){alert(r.message);},error:function(){alert('Failed');}}); }
    function downloadexcelmedicalofficer(){ fetch('/api/downloadExcelbymedicalofficer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({medicalOpinionOfficer:$("#medicalofficerdropdown option:selected").text()})}).then(r=>r.blob()).then(b=>{var a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(b),download:'Case_Data_Medical_Officer.xlsx'});document.body.appendChild(a);a.click();a.remove();}).catch(console.error); }
    function downloadexcelfilebystatus(){ fetch('/api/downloadExcelbystatus',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({casestatus:$('#casefinalstatus').val()})}).then(r=>r.blob()).then(b=>{var a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(b),download:'Case_Data.xlsx'});document.body.appendChild(a);a.click();a.remove();}).catch(console.error); }
    function downloadexcelfile(){ fetch('/api/downloadExcel').then(r=>r.blob()).then(b=>{var a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(b),download:'Case_Data.xlsx'});document.body.appendChild(a);a.click();a.remove();}).catch(console.error); }
  </script>
</body>
</html>
